name: Build Amaury Ouistiti APK

on:
  push:
    branches: [main, master]
    paths:
      - 'amaury-ouistiti-source.zip'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip source archive
        run: |
          if [ ! -f amaury-ouistiti-source.zip ]; then
            echo "ERROR: amaury-ouistiti-source.zip not found at repo root."
            exit 1
          fi
          mkdir -p project
          unzip -o amaury-ouistiti-source.zip -d project/
          if [ -d "project/amaury-ouistiti-source" ]; then
            shopt -s dotglob
            mv project/amaury-ouistiti-source/* project/
            rmdir project/amaury-ouistiti-source
          fi
          echo "Extracted content:"
          ls -la project/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install npm dependencies
        working-directory: project
        run: npm install

      - name: Add Android platform with Capacitor
        working-directory: project
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Configure app icons
        working-directory: project
        run: |
          if [ -f resources/icon.png ]; then
            ICON_DIR="android/app/src/main/res"
            for density in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
              dir="${density%%:*}"
              size="${density##*:}"
              target_dir="$ICON_DIR/mipmap-$dir"
              mkdir -p "$target_dir"
              convert resources/icon.png -resize ${size}x${size} "$target_dir/ic_launcher.png"
              convert resources/icon.png -resize ${size}x${size} "$target_dir/ic_launcher_round.png"
              convert resources/icon.png -resize ${size}x${size} "$target_dir/ic_launcher_foreground.png"
            done
            echo "Android icons configured"
          fi

      - name: Build APK
        working-directory: project/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        working-directory: project/android/app/build/outputs/apk/debug
        run: |
          mv app-debug.apk amaury-ouistiti.apk
          ls -lh amaury-ouistiti.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: amaury-ouistiti-apk
          path: project/android/app/build/outputs/apk/debug/amaury-ouistiti.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            APK built automatically from commit ${{ github.sha }}.

            Download amaury-ouistiti.apk below.

            How to install on Android:
            1. Download the APK on your phone
            2. Open the file (allow install from unknown sources if asked)
            3. Follow installation steps
          files: project/android/app/build/outputs/apk/debug/amaury-ouistiti.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
