name: ðŸ’ Construire l'APK Amaury Ouistiti

on:
  push:
    branches: [main, master]
    paths:
      - 'amaury-ouistiti-source.zip'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:    # Permet de lancer manuellement depuis l'onglet Actions

permissions:
  contents: write        # nÃ©cessaire pour crÃ©er la release et y joindre l'APK

jobs:
  build:
    name: Construire l'APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. RÃ©cupÃ©rer le dÃ©pÃ´t
      - name: ðŸ“¥ RÃ©cupÃ©rer le dÃ©pÃ´t
        uses: actions/checkout@v4

      # 2. DÃ©compresser le ZIP contenant le projet
      - name: ðŸ“¦ DÃ©compresser amaury-ouistiti-source.zip
        run: |
          if [ ! -f amaury-ouistiti-source.zip ]; then
            echo "âŒ Le fichier amaury-ouistiti-source.zip est introuvable Ã  la racine du dÃ©pÃ´t."
            exit 1
          fi
          mkdir -p project
          unzip -o amaury-ouistiti-source.zip -d project/
          # Si le ZIP contient un dossier racine, dÃ©placer son contenu vers project/
          if [ -d "project/amaury-ouistiti-source" ]; then
            shopt -s dotglob
            mv project/amaury-ouistiti-source/* project/
            rmdir project/amaury-ouistiti-source
          fi
          echo "âœ… Contenu dÃ©compressÃ© :"
          ls -la project/

      # 3. Installer Node.js (pour Capacitor)
      - name: ðŸŸ¢ Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: project/package-lock.json

      # 4. Installer Java 17 (requis par Android Gradle Plugin)
      - name: â˜• Installer JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 5. Installer le SDK Android
      - name: ðŸ¤– Installer Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      # 6. Installer les dÃ©pendances Node
      - name: ðŸ“š Installer les dÃ©pendances npm
        working-directory: project
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # 7. GÃ©nÃ©rer le projet Android via Capacitor
      - name: ðŸ”§ Initialiser le projet Android avec Capacitor
        working-directory: project
        run: |
          # Si le dossier android n'existe pas, le crÃ©er
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      # 8. Copier l'icÃ´ne dans les ressources Android
      - name: ðŸŽ¨ Configurer l'icÃ´ne de l'application
        working-directory: project
        run: |
          if [ -f resources/icon.png ]; then
            # Tailles requises pour Android : mipmap-mdpi, hdpi, xhdpi, xxhdpi, xxxhdpi
            ICON_DIR="android/app/src/main/res"
            for density in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
              dir="${density%%:*}"
              size="${density##*:}"
              target_dir="$ICON_DIR/mipmap-$dir"
              mkdir -p "$target_dir"
              # Utiliser ImageMagick (prÃ©installÃ© sur ubuntu-latest)
              convert resources/icon.png -resize ${size}x${size} "$target_dir/ic_launcher.png"
              convert resources/icon.png -resize ${size}x${size} "$target_dir/ic_launcher_round.png"
              convert resources/icon.png -resize ${size}x${size} "$target_dir/ic_launcher_foreground.png"
            done
            echo "âœ… IcÃ´nes Android configurÃ©es"
          fi

      # 9. Construire l'APK en mode debug (signÃ© automatiquement avec la clÃ© debug)
      - name: ðŸ”¨ Construire l'APK
        working-directory: project/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # 10. Renommer l'APK pour qu'il ait un nom propre
      - name: âœï¸ Renommer l'APK
        working-directory: project/android/app/build/outputs/apk/debug
        run: |
          ls -la
          mv app-debug.apk amaury-ouistiti.apk
          echo "âœ… APK prÃªt : $(pwd)/amaury-ouistiti.apk"
          ls -lh amaury-ouistiti.apk

      # 11. Publier l'APK en tant qu'artefact (tÃ©lÃ©chargeable depuis la page de l'action)
      - name: ðŸ“¤ Publier l'APK comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: amaury-ouistiti-apk
          path: project/android/app/build/outputs/apk/debug/amaury-ouistiti.apk
          retention-days: 30

      # 12. CrÃ©er une Release GitHub avec l'APK attachÃ© (sur push uniquement)
      - name: ðŸš€ CrÃ©er une Release GitHub
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }} - ${{ github.event.head_commit.message }}
          body: |
            APK construit automatiquement Ã  partir du commit ${{ github.sha }}.

            **TÃ©lÃ©chargement :** voir l'APK joint ci-dessous.

            **Installation sur Android :**
            1. TÃ©lÃ©chargez `amaury-ouistiti.apk` sur votre tÃ©lÃ©phone
            2. Ouvrez le fichier (autorisez l'installation depuis cette source si demandÃ©)
            3. Suivez les Ã©tapes d'installation
          files: project/android/app/build/outputs/apk/debug/amaury-ouistiti.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
